# iHomeNerd Brain — one-command local AI
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f
#
# GPU access requires nvidia-container-toolkit:
#   sudo apt install nvidia-container-toolkit
#   sudo systemctl restart docker

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ihomenerd-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  brain:
    build: ./backend
    container_name: ihomenerd-brain
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "17777:17777"
    volumes:
      - brain_data:/data
    environment:
      - IHN_LAN_MODE=true
      - IHN_OLLAMA_URL=http://ollama:11434
      - IHN_DATA_DIR=/data

volumes:
  ollama_data:
  brain_data:
