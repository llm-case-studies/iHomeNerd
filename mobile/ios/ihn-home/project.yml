name: IhnHome
options:
  bundleIdPrefix: com.ihomenerd
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  developmentLanguage: en

packages:
  swift-certificates:
    url: https://github.com/apple/swift-certificates
    from: "1.5.0"
  swift-crypto:
    url: https://github.com/apple/swift-crypto
    from: "3.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    branch: "main"
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.10.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: "main"
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface.git
    from: "0.9.0"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers.git
    from: "1.3.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"

targets:
  IhnHome:
    type: application
    platform: iOS
    sources:
      - path: IhnHome
    dependencies:
      - package: swift-certificates
        product: X509
      - package: swift-crypto
        product: Crypto
      - package: WhisperKit
        product: WhisperKit
      - package: mlx-swift
        product: MLX
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
    info:
      path: IhnHome/Resources/Info.plist
      properties:
        CFBundleDisplayName: iHN Home
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
        NSLocalNetworkUsageDescription: >-
          iHN Home discovers and pairs with your iHomeNerd gateway and nodes on
          your local network. It does not send your data to outside services.
        NSMicrophoneUsageDescription: >-
          iHN Home uses the microphone for the on-device Listen demo. Audio
          stays on this phone — nothing is uploaded.
        NSSpeechRecognitionUsageDescription: >-
          iHN Home uses on-device speech recognition for the Listen demo so
          you can see the phone transcribe what you say. Apple's recognizer
          runs locally; no audio leaves the device.
        NSBonjourServices:
          - _ihomenerd._tcp
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ihomenerd.home
        PRODUCT_NAME: IhnHome
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_PREVIEWS: "YES"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
      configVariants: []
      gatherCoverageData: false
      commandLineArguments: {}
      environmentVariables: {}
