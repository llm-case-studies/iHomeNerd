<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans)}
  .card{padding:22px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;align-items:baseline;gap:16px}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);width:210px;flex-shrink:0}
  .t-panel{font-size:18px;font-weight:500}
  .t-h3{font-size:18px;font-weight:600}
  .t-body{font-size:15px;line-height:1.5}
  .t-small{font-size:13px;color:var(--text-secondary)}
  .t-label{font-size:12px;font-weight:500;letter-spacing:0.02em;color:var(--text-secondary)}
  .t-over{font-size:12px;font-weight:500;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent)}
</style></head>
<body><div class="card">
  <div class="row"><div class="lbl">Inter 500 · 18/26</div><div class="t-panel">Home overview</div></div>
  <div class="row"><div class="lbl">Inter 600 · 18/24</div><div class="t-h3">Gateway node</div></div>
  <div class="row"><div class="lbl">Inter 400 · 15/22</div><div class="t-body">Three nodes online. Trust verified 4h ago.</div></div>
  <div class="row"><div class="lbl">Inter 400 · 13/21 secondary</div><div class="t-small">Managed via SSH. Runtime healthy.</div></div>
  <div class="row"><div class="lbl">Inter 500 · 12 label</div><div class="t-label">HOSTNAME</div></div>
  <div class="row"><div class="lbl">Inter 500 · 12 · 0.25em</div><div class="t-over">Public repo, private data</div></div>
</div></body></html>
