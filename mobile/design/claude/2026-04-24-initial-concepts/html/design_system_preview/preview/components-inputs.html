<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans);font-size:13px}
  .card{padding:22px;display:flex;flex-direction:column;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .lbl{font-size:12px;color:var(--text-secondary);font-weight:500}
  input,select{font-family:inherit;font-size:14px;background:#252830;border:1px solid #2e3140;color:#e4e6eb;border-radius:6px;padding:9px 12px;outline:none;transition:border-color .15s}
  input:focus,select:focus{border-color:#4f8cff}
  .ip{font-family:var(--font-mono)}
  .row{display:flex;gap:12px}
  .row>.field{flex:1}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="field"><span class="lbl">Host</span><input class="ip" value="192.168.0.147"></div>
    <div class="field"><span class="lbl">SSH user</span><input value="alex"></div>
    <div class="field" style="flex:0 0 110px"><span class="lbl">Port</span><input class="ip" value="22"></div>
  </div>
  <div class="field"><span class="lbl">Install path</span><input class="ip" value="~/.ihomenerd"></div>
  <div class="field"><span class="lbl">Runtime kind</span>
    <select><option>docker compose</option><option>systemd</option></select></div>
</div></body></html>
