<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans)}
  .card{padding:22px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:center;gap:14px;font-family:var(--font-mono);font-size:14px}
  .lbl{font-family:var(--font-sans);font-size:11px;color:var(--text-secondary);width:120px;flex-shrink:0}
  .code{background:var(--bg-input);border:1px solid var(--border-color);border-radius:8px;padding:10px 14px;font-family:var(--font-mono);font-size:13px;color:var(--text-primary);flex:1}
  .ip{letter-spacing:0.02em}
  .fp{letter-spacing:0.04em}
</style></head>
<body><div class="card">
  <div class="row"><span class="lbl">Model ID</span><span class="ip">gemma3:4b</span></div>
  <div class="row"><span class="lbl">Hostname</span><span class="ip">msi-raider-linux</span></div>
  <div class="row"><span class="lbl">IP</span><span class="ip">192.168.0.229</span></div>
  <div class="row"><span class="lbl">Fingerprint</span><span class="fp">SHA256 4C:7E:3B:A9:18:…:A1:FF</span></div>
  <div class="code">$ ihomenerd status<br>&nbsp;&nbsp;runtime&nbsp;&nbsp;online&nbsp;&nbsp;uptime 3h 12m</div>
</div></body></html>
