<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans)}
  .card{padding:22px;display:flex;flex-direction:column;gap:10px}
  .h{font-family:var(--font-display);font-weight:700;font-size:40px;line-height:1.1;letter-spacing:-0.01em}
  .d{font-family:var(--font-display);font-weight:700;font-size:56px;line-height:1.05;letter-spacing:-0.02em}
  .gr{background:linear-gradient(90deg,#4f8cff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary)}
</style></head>
<body><div class="card">
  <div class="d">Pair with <span class="gr">your Home</span></div>
  <div class="meta">Space Grotesk · 700 · 56/60 · -0.02em</div>
  <div class="h">Home overview</div>
  <div class="meta">Space Grotesk · 700 · 40/44 · -0.01em</div>
</div></body></html>
