<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans);font-size:13px}
  .card{padding:22px;display:flex;flex-direction:column;gap:14px}
  .nav{display:flex;gap:4px;border-bottom:1px solid var(--border-color);background:var(--bg-surface);border-radius:8px 8px 0 0;padding:0 8px}
  .tab{display:flex;align-items:center;gap:8px;padding:14px 16px;font-size:13px;font-weight:500;color:var(--text-secondary);position:relative;cursor:default}
  .tab:hover{color:var(--text-primary);background:rgba(37,40,48,.5)}
  .tab.active{color:#4f8cff}
  .tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:#4f8cff;border-radius:2px 2px 0 0}
  svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500;background:rgba(52,211,153,.10);border:1px solid rgba(52,211,153,.20);color:#34d399;align-self:flex-start;margin-left:6px}
  .dot{width:6px;height:6px;border-radius:999px;background:#34d399;animation:ping 1.8s infinite}
  @keyframes ping{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
</style></head>
<body><div class="card">
  <div class="nav">
    <div class="tab active"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</div>
    <div class="tab"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg>Talk</div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>Docs</div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="m5 8 6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/></svg>Translate</div>
    <div class="tab"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Investigate</div>
    <div class="tab"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4M8 16h.01M16 16h.01"/></svg>Agents</div>
    <div class="tab"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="8" rx="2"/><rect x="2" y="13" width="20" height="8" rx="2"/><path d="M6 7h.01M6 17h.01"/></svg>System<span class="pill"><span class="dot"></span>online</span></div>
  </div>
</div></body></html>
