<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans)}
  .card{padding:22px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{font-family:inherit;font-size:14px;font-weight:500;border-radius:12px;padding:10px 20px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .15s}
  .primary{background:#4f8cff;color:#fff;border-color:#4f8cff}
  .primary:hover{background:#6ba0ff;border-color:#6ba0ff}
  .secondary{background:#1a1d27;color:#e4e6eb;border-color:#2e3140}
  .secondary:hover{background:#252830}
  .ghost{background:transparent;color:#8b8fa3;border-color:transparent}
  .ghost:hover{color:#e4e6eb;background:rgba(37,40,48,.5)}
  .danger{background:transparent;color:#f87171;border:1px solid rgba(248,113,113,.20)}
  .danger:hover{background:rgba(248,113,113,.10)}
  .sm{padding:6px 12px;font-size:13px;border-radius:8px}
  .lbl{font-size:11px;color:var(--text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:0.08em}
  svg{width:16px;height:16px}
</style></head>
<body><div class="card">
  <div class="lbl">Primary · secondary · ghost · danger</div>
  <div class="row">
    <button class="primary">Pair securely <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    <button class="secondary">Review</button>
    <button class="ghost">Cancel</button>
    <button class="danger">Drain node</button>
  </div>
  <div class="lbl">Small · table-row actions</div>
  <div class="row">
    <button class="secondary sm">Restart</button>
    <button class="secondary sm">Preflight</button>
    <button class="secondary sm">SSH Doctor</button>
  </div>
</div></body></html>
