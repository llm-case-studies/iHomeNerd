<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans);font-size:13px}
  .card{padding:20px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:6px}
  .chip{width:100%;height:56px;border-radius:8px;border:1px solid var(--border-color)}
  .name{font-weight:600;font-size:12px;color:var(--text-primary)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary)}
  .col{flex:1 1 90px;min-width:90px}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="col sw"><div class="chip" style="background:#0f1117"></div><div class="name">bg-primary</div><div class="hex">#0f1117</div></div>
    <div class="col sw"><div class="chip" style="background:#1a1d27"></div><div class="name">bg-surface</div><div class="hex">#1a1d27</div></div>
    <div class="col sw"><div class="chip" style="background:#252830"></div><div class="name">bg-input</div><div class="hex">#252830</div></div>
    <div class="col sw"><div class="chip" style="background:#2e3140"></div><div class="name">border</div><div class="hex">#2e3140</div></div>
    <div class="col sw"><div class="chip" style="background:#8b8fa3"></div><div class="name">text-secondary</div><div class="hex">#8b8fa3</div></div>
    <div class="col sw"><div class="chip" style="background:#e4e6eb"></div><div class="name">text-primary</div><div class="hex">#e4e6eb</div></div>
  </div>
</div></body></html>
