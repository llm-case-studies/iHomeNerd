<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iHomeNerd Bridge</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --green-bg: #0a2e1a;
    --red: #ef4444;
    --red-bg: #2e0a0a;
    --orange: #f59e0b;
    --orange-bg: #2e2a0a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 380px;
    padding: 16px;
  }

  h1 {
    font-size: 15px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* Brain list */
  .brain-list { list-style: none; }

  .brain-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 4px;
  }

  .brain-item:hover { background: var(--border); }
  .brain-item.selected { background: #1e3a5f; border: 1px solid var(--accent); }

  .brain-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .brain-dot.online { background: var(--green); }
  .brain-dot.offline { background: var(--red); }
  .brain-dot.unknown { background: var(--muted); }

  .brain-info { flex: 1; min-width: 0; }

  .brain-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .brain-url {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .brain-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .brain-select-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .brain-select-btn:hover { background: var(--accent); color: white; }
  .brain-select-btn.active { background: var(--green); border-color: var(--green); color: white; cursor: default; }

  /* Buttons */
  .btn-row { display: flex; gap: 6px; margin-top: 8px; }

  button.btn {
    flex: 1;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { background: #374151; color: var(--muted); cursor: not-allowed; }

  .btn-secondary { background: #2a2d3a; color: var(--text); }
  .btn-secondary:hover { background: #374151; }

  /* Input */
  .manual-input {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  input[type="text"] {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text);
    background: var(--bg);
  }

  input[type="text"]::placeholder { color: #4b5563; }

  /* Status */
  .status-box {
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .status-ok { background: var(--green-bg); border: 1px solid var(--green); color: var(--green); }
  .status-err { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); }
  .status-warn { background: var(--orange-bg); border: 1px solid var(--orange); color: var(--orange); }
  .status-info { background: var(--card); border: 1px solid var(--border); color: var(--muted); }

  .scanning {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 0;
    font-size: 12px;
    color: var(--muted);
  }

  .scanning-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .empty-state {
    text-align: center;
    padding: 14px 8px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }

  .toggle-manual {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    margin-top: 6px;
  }

  .toggle-manual:hover { text-decoration: underline; }

  .hidden { display: none !important; }

  .divider {
    border-top: 1px solid var(--border);
    margin: 8px 0;
  }

  .version {
    text-align: center;
    font-size: 10px;
    color: #4b5563;
    margin-top: 6px;
  }
</style>
</head>
<body>

<h1>iHomeNerd Bridge</h1>
<p class="subtitle">Connect web apps to your local AI home gateway</p>

<!-- Selected brain -->
<div class="section">
  <div class="section-title">Connected Home</div>
  <div id="active-brain-display"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-test">Test Connection</button>
  </div>
  <div id="test-result" class="hidden" style="margin-top:8px;"></div>
</div>

<!-- Discovery -->
<div class="section">
  <div class="section-title">Nodes on Your Network</div>
  <div id="brain-list-container">
    <div class="empty-state" id="empty-state">
      Click <strong>Scan LAN</strong> to find iHomeNerd nodes on your network.
    </div>
    <ul class="brain-list hidden" id="brain-list"></ul>
    <div class="scanning hidden" id="scanning-indicator">
      <div class="scanning-row">
        <div class="spinner"></div>
        <span id="scanning-text">Scanning your network...</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-scan">Scan LAN</button>
  </div>
  <button class="toggle-manual" id="toggle-manual">Enter address manually...</button>
  <div class="manual-input hidden" id="manual-section">
    <input type="text" id="manual-url" placeholder="https://your-gateway.local:17777" />
    <button class="btn btn-secondary" id="btn-manual-save" style="flex:none;padding:8px 14px;">Use as Gateway</button>
  </div>
</div>

<!-- Diagnostics -->
<div class="section hidden" id="diag-section">
  <div class="section-title">Diagnostics</div>
  <div id="diag-content" class="status-box status-info"></div>
</div>

<div class="version" id="version-label"></div>

<script src="popup.js"></script>
</body>
</html>
